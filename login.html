<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Manajemen Timbangan Hasil Panen</title>
    
    <!-- Bootstrap 5 dari CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        /* ============================================
           RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27, #1a1a3e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background animasi */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(13, 110, 253, 0.1) 0%, transparent 70%);
            animation: pulseBg 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(111, 66, 193, 0.08) 0%, transparent 70%);
            animation: pulseBg 10s ease-in-out infinite reverse;
        }

        @keyframes pulseBg {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* ============================================
           LOADING SCREEN
           ============================================ */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loadingScreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-container {
            text-align: center;
            color: white;
        }

        .loader {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
            animation: bounceIcon 1.5s ease-in-out infinite;
        }

        @keyframes bounceIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .loader-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .loader-subtext {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 0.3rem;
        }

        .loader-progress {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 20px auto 0;
            overflow: hidden;
        }

        .loader-progress-bar {
            height: 100%;
            background: white;
            border-radius: 10px;
            width: 0%;
            animation: progressBar 2s ease-in-out infinite;
        }

        @keyframes progressBar {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        /* ============================================
           LOGIN CARD
           ============================================ */
        .auth-card {
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            border: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-card .card-body {
            padding: 40px;
        }

        /* Logo */
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo .logo-icon {
            width: 75px;
            height: 75px;
            border-radius: 22px;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            margin-bottom: 16px;
            animation: floatLogo 3s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.3);
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(-3deg); }
        }

        .auth-logo h3 {
            font-weight: 700;
            color: #0a0e27;
            font-size: 1.6rem;
        }

        .auth-logo p {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 0;
        }

        /* Form */
        .auth-card .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #495057;
        }

        .auth-card .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .auth-card .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.12);
        }

        .auth-card .form-control.is-invalid {
            border-color: #dc3545;
        }

        .auth-card .form-control.is-invalid:focus {
            box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.12);
        }

        .auth-card .input-group-text {
            border-radius: 12px 0 0 12px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-right: none;
            color: #6c757d;
            font-size: 1rem;
        }

        .auth-card .input-group .form-control {
            border-radius: 0 12px 12px 0;
        }

        .auth-card .btn-login {
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            border: none;
            color: white;
            width: 100%;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .auth-card .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(13, 110, 253, 0.35);
        }

        .auth-card .btn-login:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }

        .auth-card .btn-login .spinner-border {
            width: 20px;
            height: 20px;
        }

        .auth-card .toggle-password {
            border-radius: 0 12px 12px 0;
            border: 2px solid #e9ecef;
            border-left: none;
            background: #f8f9fa;
            color: #6c757d;
            padding: 0 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .auth-card .toggle-password:hover {
            background: #e9ecef;
        }

        .auth-card .form-check-label {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .auth-card .auth-link {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-card .auth-link:hover {
            text-decoration: underline;
        }

        .auth-card .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .auth-card .divider::before,
        .auth-card .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid #e9ecef;
        }

        .auth-card .divider span {
            padding: 0 16px;
            color: #6c757d;
            font-size: 0.85rem;
        }

        /* Alert */
        #alertContainer {
            margin-bottom: 16px;
            min-height: 50px;
        }

        .alert {
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9rem;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert i {
            margin-right: 8px;
        }

        /* Demo Credentials */
        .demo-credentials {
            margin-top: 16px;
            padding: 14px 16px;
            background: #f0f4ff;
            border-radius: 12px;
            border: 1px solid rgba(13, 110, 253, 0.15);
        }

        .demo-credentials small {
            display: block;
            text-align: center;
            color: #6c757d;
            font-size: 0.75rem;
            margin-bottom: 6px;
        }

        .demo-credentials .row {
            font-size: 0.8rem;
            color: #495057;
        }

        .demo-credentials .row strong {
            color: #0d6efd;
        }

        .demo-credentials .badge-demo {
            background: rgba(13, 110, 253, 0.1);
            color: #0d6efd;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
        }

        /* ============================================
           WHATSAPP FLOAT
           ============================================ */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            background: #25d366;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            z-index: 999;
            transition: all 0.3s ease;
            animation: pulseWA 2s ease-in-out infinite;
            text-decoration: none;
        }

        .whatsapp-float:hover {
            transform: scale(1.1) rotate(-5deg);
            color: white;
            box-shadow: 0 6px 30px rgba(37, 211, 102, 0.5);
        }

        @keyframes pulseWA {
            0%, 100% { box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4); }
            50% { box-shadow: 0 4px 40px rgba(37, 211, 102, 0.6); }
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 576px) {
            .auth-card .card-body {
                padding: 24px;
            }
            .auth-logo .logo-icon {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
            .auth-logo h3 {
                font-size: 1.2rem;
            }
            .whatsapp-float {
                width: 48px;
                height: 48px;
                font-size: 1.5rem;
                bottom: 16px;
                right: 16px;
            }
            .demo-credentials .row {
                font-size: 0.7rem;
            }
        }

        /* ============================================
           SHAKE ANIMATION (untuk error)
           ============================================ */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-15px); }
            40% { transform: translateX(15px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.5s ease;
        }
    </style>
</head>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Firebase Config -->
<script src="js/firebase-config.js"></script>
<body>

    <!-- ============================================
    LOADING SCREEN
    ============================================ -->
    <div id="loadingScreen">
        <div class="loader-container">
            <i class="bi bi-scale loader-icon"></i>
            <div class="loader"></div>
            <div class="loader-text">Memuat...</div>
            <div class="loader-subtext">Sistem Manajemen Timbangan Hasil Panen</div>
            <div class="loader-progress">
                <div class="loader-progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- ============================================
    LOGIN CARD
    ============================================ -->
    <div class="auth-card" id="authCard">
        <div class="card-body">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="logo-icon">
                    <i class="bi bi-scale"></i>
                </div>
                <h3>Sistem Timbangan Panen</h3>
                <p>Masuk untuk mengelola transaksi</p>
            </div>

            <!-- Alert Container -->
            <div id="alertContainer"></div>

            <!-- Login Form -->
            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope me-1"></i> Email
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" 
                               class="form-control" 
                               id="email" 
                               placeholder="admin@timbanganpanen.com" 
                               value="admin@timbanganpanen.com"
                               autofocus
                               required>
                    </div>
                    <div class="invalid-feedback" id="emailFeedback">Email wajib diisi</div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock me-1"></i> Password
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" 
                               class="form-control" 
                               id="password" 
                               placeholder="Masukkan password"
                               value="admin123"
                               required>
                        <button class="toggle-password" type="button" id="togglePassword">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback" id="passwordFeedback">Password wajib diisi</div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Ingat saya</label>
                    </div>
                    <a href="#" class="auth-link small">Lupa password?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i> Masuk
                </button>
            </form>

            <div class="divider">
                <span>atau</span>
            </div>

            <div class="text-center">
                <p class="text-muted mb-0">
                    Belum punya akun? <a href="register.html" class="auth-link">Daftar sekarang</a>
                </p>
                <a href="index.html" class="text-muted text-decoration-none small mt-2 d-inline-block">
                    <i class="bi bi-arrow-left"></i> Kembali ke beranda
                </a>
            </div>

            <!-- Demo Credentials -->
            <div class="demo-credentials">
                <small>
                    <i class="bi bi-info-circle"></i> 
                    Akun Demo 
                    <span class="badge-demo">Gratis</span>
                </small>
                <div class="row text-center">
                    <div class="col-6">
                        <span class="text-muted">Email</span><br>
                        <strong>admin@timbanganpanen.com</strong>
                    </div>
                    <div class="col-6">
                        <span class="text-muted">Password</span><br>
                        <strong>admin123</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    WHATSAPP FLOATING BUTTON
    ============================================ -->
    <a href="https://wa.me/6281248141031?text=Halo%20Admin%2C%20saya%20ingin%20bertanya%20mengenai%20Sistem%20Manajemen%20Timbangan%20Hasil%20Panen." 
       class="whatsapp-float" 
       target="_blank"
       title="Hubungi Admin via WhatsApp">
        <i class="bi bi-whatsapp"></i>
    </a>

    <!-- ============================================
    SCRIPTS - SEMUA INLINE, TIDAK PERLU FILE EKSTERNAL
    ============================================ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
        // Bootstrap JS untuk alert dismiss
    </script>

    <script>
        // ============================================
        // 1. HIDE LOADING SCREEN - MULTI FALLBACK
        // ============================================
        
        // Method 1: DOM Ready
        document.addEventListener('DOMContentLoaded', function() {
            hideLoading();
        });

        // Method 2: 1.5 detik
        setTimeout(hideLoading, 1500);

        // Method 3: 3 detik (PASTI)
        setTimeout(hideLoading, 3000);

        // Method 4: 5 detik (ULTIMATE FALLBACK)
        setTimeout(hideLoading, 5000);

        function hideLoading() {
            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
                loadingScreen.classList.add('hidden');
                setTimeout(function() {
                    loadingScreen.style.display = 'none';
                }, 800);
            }
        }

        // ============================================
        // 2. TOGGLE PASSWORD VISIBILITY
        // ============================================
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.className = 'bi bi-eye-slash';
            } else {
                passwordInput.type = 'password';
                toggleIcon.className = 'bi bi-eye';
            }
        });

        // ============================================
        // 3. SHOW ALERT FUNCTION
        // ============================================
        function showAlert(message, type = 'success') {
            const container = document.getElementById('alertContainer');
            
            const icons = {
                success: 'bi-check-circle-fill',
                danger: 'bi-exclamation-triangle-fill',
                warning: 'bi-exclamation-circle-fill',
                info: 'bi-info-circle-fill'
            };
            
            const colors = {
                success: '#d1e7dd',
                danger: '#f8d7da',
                warning: '#fff3cd',
                info: '#cfe2ff'
            };
            
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert" style="background: ${colors[type] || '#e9ecef'};">
                    <i class="bi ${icons[type] || 'bi-info-circle-fill'}"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                const alert = container.querySelector('.alert');
                if (alert) {
                    alert.style.transition = 'opacity 0.5s ease';
                    alert.style.opacity = '0';
                    setTimeout(() => {
                        if (alert.parentNode) alert.remove();
                    }, 500);
                }
            }, 5000);
        }

        // ============================================
        // 4. LOGIN HANDLER
        // ============================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            // Reset validasi
            document.getElementById('email').classList.remove('is-invalid');
            document.getElementById('password').classList.remove('is-invalid');

            // Validasi
            let isValid = true;
            if (!email) {
                document.getElementById('email').classList.add('is-invalid');
                isValid = false;
            }
            if (!password) {
                document.getElementById('password').classList.add('is-invalid');
                isValid = false;
            }

            if (!isValid) {
                showAlert('Silakan isi email dan password!', 'warning');
                return;
            }

            // Loading state
            const loginBtn = document.getElementById('loginBtn');
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = `
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Memproses...
            `;
            loginBtn.disabled = true;

            // SIMULASI LOGIN (Demo Mode)
            setTimeout(function() {
                // Cek kredensial
                if (email === 'admin@timbanganpanen.com' && password === 'admin123') {
                    // Login BERHASIL
                    const userData = {
                        id: 'user_' + Date.now(),
                        name: 'Admin',
                        email: email,
                        role: 'admin',
                        loginTime: new Date().toISOString()
                    };

                    // Simpan session
                    if (remember) {
                        localStorage.setItem('user', JSON.stringify(userData));
                        localStorage.setItem('session', 'true');
                    } else {
                        sessionStorage.setItem('user', JSON.stringify(userData));
                        sessionStorage.setItem('session', 'true');
                    }

                    showAlert('✅ Login berhasil! Selamat datang, Admin!', 'success');

                    // Redirect ke dashboard
                    setTimeout(function() {
                        window.location.href = 'dashboard.html';
                    }, 1000);

                } else {
                    // Login GAGAL
                    showAlert('❌ Email atau password salah! Silakan coba lagi.', 'danger');
                    
                    // Shake animation
                    document.getElementById('authCard').classList.add('shake');
                    setTimeout(function() {
                        document.getElementById('authCard').classList.remove('shake');
                    }, 500);

                    // Reset button
                    loginBtn.innerHTML = originalText;
                    loginBtn.disabled = false;
                }
            }, 1500);
        });

        // ============================================
        // 5. ENTER KEY SUPPORT
        // ============================================
        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        document.getElementById('email').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });

        // ============================================
        // 6. CHECK IF ALREADY LOGGED IN
        // ============================================
        try {
            const user = localStorage.getItem('user') || sessionStorage.getItem('user');
            if (user) {
                // Redirect ke dashboard jika sudah login
                window.location.href = 'dashboard.html';
            }
        } catch (e) {
            console.log('Session check skipped');
        }

        // ============================================
        // 7. LOG
        // ============================================
        console.log('%c✅ Sistem Manajemen Timbangan Hasil Panen', 'color: #0d6efd; font-size: 16px; font-weight: bold;');
        console.log('%c📧 Email: admin@timbanganpanen.com', 'color: #6c757d;');
        console.log('%c🔑 Password: admin123', 'color: #6c757d;');
        console.log('%c🚀 Silakan login untuk melanjutkan', 'color: #20c997;');
    </script>

</body>
</html>
