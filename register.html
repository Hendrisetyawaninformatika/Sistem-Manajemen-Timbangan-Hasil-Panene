<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Firebase Config -->
<script src="js/firebase-config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Sistem Manajemen Timbangan Hasil Panen</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    
    <style>
        /* Same styles as login.html */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27, #1a1a3e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(13, 110, 253, 0.1) 0%, transparent 70%);
            animation: pulseBg 8s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(25, 135, 84, 0.08) 0%, transparent 70%);
            animation: pulseBg 10s ease-in-out infinite reverse;
        }
        @keyframes pulseBg {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #198754, #157347);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #loadingScreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-container {
            text-align: center;
            color: white;
            animation: fadeInUp 0.8s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loader-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 1rem;
        }
        .auth-card {
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-card .card-body { padding: 40px; }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo .logo-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: linear-gradient(135deg, #198754, #157347);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            margin-bottom: 16px;
            animation: floatIcon 3s ease-in-out infinite;
        }
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .auth-logo h3 { font-weight: 700; color: #0a0e27; font-size: 1.5rem; }
        .auth-logo p { color: #6c757d; font-size: 0.95rem; margin-bottom: 0; }
        .auth-card .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .auth-card .form-control:focus {
            border-color: #198754;
            box-shadow: 0 0 0 3px rgba(25, 135, 84, 0.15);
        }
        .auth-card .form-control.is-invalid { border-color: #dc3545; }
        .auth-card .input-group-text {
            border-radius: 12px 0 0 12px;
            background: transparent;
            border: 2px solid #e9ecef;
            border-right: none;
            color: #6c757d;
            font-size: 1rem;
        }
        .auth-card .input-group .form-control { border-radius: 0 12px 12px 0; }
        .auth-card .btn-register {
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #198754, #157347);
            border: none;
            color: white;
            width: 100%;
            cursor: pointer;
        }
        .auth-card .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(25, 135, 84, 0.3);
        }
        .auth-card .btn-register:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }
        .auth-card .toggle-password {
            border-radius: 0 12px 12px 0;
            border: 2px solid #e9ecef;
            border-left: none;
            background: transparent;
            color: #6c757d;
            padding: 0 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .auth-card .toggle-password:hover { background: #f8f9fa; }
        .auth-card .form-check-label { font-size: 0.9rem; color: #6c757d; }
        .auth-card .auth-link { color: #198754; text-decoration: none; font-weight: 600; }
        .auth-card .auth-link:hover { text-decoration: underline; }
        .auth-card .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }
        .auth-card .divider::before,
        .auth-card .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid #e9ecef;
        }
        .auth-card .divider span {
            padding: 0 16px;
            color: #6c757d;
            font-size: 0.85rem;
        }
        .alert-container { margin-bottom: 16px; }
        .alert {
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9rem;
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            background: #e9ecef;
            overflow: hidden;
        }
        .password-strength .strength-bar {
            height: 100%;
            transition: width 0.3s ease, background-color 0.3s ease;
            width: 0%;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            background: #25d366;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            z-index: 999;
            transition: all 0.3s ease;
            animation: pulseWA 2s ease-in-out infinite;
            text-decoration: none;
        }
        .whatsapp-float:hover {
            transform: scale(1.1) rotate(-5deg);
            color: white;
            box-shadow: 0 6px 30px rgba(37, 211, 102, 0.5);
        }
        @keyframes pulseWA {
            0%, 100% { box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4); }
            50% { box-shadow: 0 4px 40px rgba(37, 211, 102, 0.6); }
        }
        @media (max-width: 576px) {
            .auth-card .card-body { padding: 24px; }
            .auth-logo .logo-icon { width: 56px; height: 56px; font-size: 2rem; }
            .auth-logo h3 { font-size: 1.2rem; }
            .whatsapp-float { width: 48px; height: 48px; font-size: 1.5rem; bottom: 16px; right: 16px; }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-text">Memuat...</div>
        </div>
    </div>

    <!-- Register Card -->
    <div class="auth-card">
        <div class="card-body">
            <div class="auth-logo">
                <div class="logo-icon">
                    <i class="bi bi-person-plus"></i>
                </div>
                <h3>Daftar Akun</h3>
                <p>Buat akun untuk memulai</p>
            </div>

            <div id="alertContainer" class="alert-container"></div>

            <form id="registerForm" novalidate>
                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">Nama Lengkap</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="name" placeholder="Masukkan nama lengkap" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" placeholder="Masukkan email" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Minimal 6 karakter" minlength="6" required>
                        <button class="toggle-password" type="button" id="togglePassword">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <small class="text-muted" id="strengthText">Ketik password untuk melihat kekuatan</small>
                </div>

                <div class="mb-3">
                    <label for="password_confirmation" class="form-label fw-semibold">Konfirmasi Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password_confirmation" placeholder="Konfirmasi password" required>
                    </div>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label" for="terms">
                        Saya setuju dengan <a href="#" class="auth-link">Syarat & Ketentuan</a>
                    </label>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">
                    <i class="bi bi-person-plus"></i> Daftar
                </button>
            </form>

            <div class="divider">
                <span>atau</span>
            </div>

            <div class="text-center">
                <p class="text-muted mb-0">
                    Sudah punya akun? <a href="login.html" class="auth-link">Masuk sekarang</a>
                </p>
                <a href="index.html" class="text-muted text-decoration-none small mt-2 d-inline-block">
                    <i class="bi bi-arrow-left"></i> Kembali ke beranda
                </a>
            </div>
        </div>
    </div>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/6281248141031?text=Halo%20Admin%2C%20saya%20ingin%20bertanya%20mengenai%20Sistem%20Manajemen%20Timbangan%20Hasil%20Panen." 
       class="whatsapp-float" 
       target="_blank"
       title="Hubungi Admin via WhatsApp">
        <i class="bi bi-whatsapp"></i>
    </a>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        // Hide loading screen
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const loadingScreen = document.getElementById('loadingScreen');
                if (loadingScreen) {
                    loadingScreen.classList.add('hidden');
                    setTimeout(function() { loadingScreen.style.display = 'none'; }, 600);
                }
            }, 800);
        });

        // Toggle password
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.className = 'bi bi-eye-slash';
            } else {
                passwordInput.type = 'password';
                toggleIcon.className = 'bi bi-eye';
            }
        });

        // Password strength
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            let strength = 0;
            if (password.length >= 6) strength += 20;
            if (password.length >= 10) strength += 20;
            if (/[a-z]/.test(password)) strength += 20;
            if (/[A-Z]/.test(password)) strength += 20;
            if (/[0-9]/.test(password)) strength += 20;
            
            strengthBar.style.width = strength + '%';
            
            if (strength < 40) {
                strengthBar.style.backgroundColor = '#dc3545';
                strengthText.textContent = 'Lemah';
                strengthText.style.color = '#dc3545';
            } else if (strength < 70) {
                strengthBar.style.backgroundColor = '#ffc107';
                strengthText.textContent = 'Sedang';
                strengthText.style.color = '#ffc107';
            } else {
                strengthBar.style.backgroundColor = '#198754';
                strengthText.textContent = 'Kuat';
                strengthText.style.color = '#198754';
            }
        });

        // Show alert function
        function showAlert(message, type = 'success') {
            const container = document.getElementById('alertContainer');
            const icons = {
                success: 'bi-check-circle-fill',
                danger: 'bi-exclamation-triangle-fill',
                warning: 'bi-exclamation-circle-fill',
                info: 'bi-info-circle-fill'
            };
            
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi ${icons[type] || 'bi-info-circle-fill'}"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
            
            setTimeout(() => {
                const alert = container.querySelector('.alert');
                if (alert) {
                    alert.style.transition = 'opacity 0.5s ease';
                    alert.style.opacity = '0';
                    setTimeout(() => { if (alert.parentNode) alert.remove(); }, 500);
                }
            }, 5000);
        }

        // Register handler with Firebase
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirmation = document.getElementById('password_confirmation').value;
            const terms = document.getElementById('terms').checked;

            if (!name || !email || !password || !passwordConfirmation) {
                showAlert('Silakan isi semua field!', 'warning');
                return;
            }

            if (password.length < 6) {
                showAlert('Password minimal 6 karakter!', 'warning');
                return;
            }

            if (password !== passwordConfirmation) {
                showAlert('Password dan konfirmasi tidak sama!', 'warning');
                return;
            }

            if (!terms) {
                showAlert('Silakan setujui Syarat & Ketentuan!', 'warning');
                return;
            }

            const registerBtn = document.getElementById('registerBtn');
            const originalText = registerBtn.innerHTML;
            registerBtn.innerHTML = `
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Mendaftar...
            `;
            registerBtn.disabled = true;

            // Register with Firebase Auth
            auth.createUserWithEmailAndPassword(email, password)
                .then(async (userCredential) => {
                    const user = userCredential.user;
                    
                    // Update profile
                    await user.updateProfile({
                        displayName: name
                    });

                    // Save user data to Firestore
                    await FireDB.users.create({
                        id: user.uid,
                        name: name,
                        email: email,
                        role: 'admin'
                    });

                    // Store session
                    const userData = {
                        id: user.uid,
                        name: name,
                        email: email,
                        role: 'admin'
                    };
                    sessionStorage.setItem('user', JSON.stringify(userData));

                    showAlert('Registrasi berhasil! Selamat datang, ' + name + '!', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                })
                .catch((error) => {
                    console.error('Register error:', error);
                    
                    let errorMessage = 'Registrasi gagal! ';
                    switch (error.code) {
                        case 'auth/email-already-in-use':
                            errorMessage += 'Email sudah terdaftar.';
                            break;
                        case 'auth/invalid-email':
                            errorMessage += 'Format email tidak valid.';
                            break;
                        case 'auth/weak-password':
                            errorMessage += 'Password terlalu lemah.';
                            break;
                        default:
                            errorMessage += error.message;
                    }
                    
                    showAlert(errorMessage, 'danger');
                })
                .finally(() => {
                    registerBtn.innerHTML = originalText;
                    registerBtn.disabled = false;
                });
        });

        // Check if already logged in
        const user = localStorage.getItem('user') || sessionStorage.getItem('user');
        if (user) {
            window.location.href = 'dashboard.html';
        }

        // Fallback hide loading
        setTimeout(function() {
            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
                loadingScreen.classList.add('hidden');
                setTimeout(function() { loadingScreen.style.display = 'none'; }, 600);
            }
        }, 3000);

        console.log('✅ Halaman Register dengan Firebase berhasil dimuat!');
    </script>

</body>
</html>
